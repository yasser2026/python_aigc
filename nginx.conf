# 用法：cp nginx.conf /etc/nginx/nginx.conf && nginx -t && systemctl reload nginx
#
# 站点：
#   www.lawaibot.com.cn   — 法律咨询 + /ai_legal/ → 8089
#   coder.lawaibot.com.cn — 接单平台 + /api/ → 8090
#   aigc.lawaibot.com.cn  — 小说转短视频 + /api/ → 8091
#
# 证书（多域共用，扩域 aigc 后）：
#   certbot certonly --nginx -d www.lawaibot.com.cn -d coder.lawaibot.com.cn -d aigc.lawaibot.com.cn --expand

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    # 未匹配域名的 HTTPS 请求直接断开，避免落到 www 站点
    server {
        listen 443 ssl http2 default_server;
        server_name _;
        ssl_certificate     /etc/letsencrypt/live/www.lawaibot.com.cn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/www.lawaibot.com.cn/privkey.pem;
        return 444;
    }

    # --- HTTP：按访问域名跳转 HTTPS，禁止写死 www ---
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }

    server {
        listen 80;
        server_name coder.lawaibot.com.cn;
        return 301 https://coder.lawaibot.com.cn$request_uri;
    }

    server {
        listen 80;
        server_name www.lawaibot.com.cn;
        return 301 https://www.lawaibot.com.cn$request_uri;
    }

    server {
        listen 80;
        server_name aigc.lawaibot.com.cn;
        return 301 https://aigc.lawaibot.com.cn$request_uri;
    }

    # --- aigc.lawaibot.com.cn（小说转短视频 AIGC）---
    server {
        listen 443 ssl http2;
        server_name aigc.lawaibot.com.cn;

        ssl_certificate     /etc/letsencrypt/live/www.lawaibot.com.cn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/www.lawaibot.com.cn/privkey.pem;

        ssl_session_timeout 10m;
        ssl_session_cache shared:SSL:10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        root /root/code/python_agic/aigc_front/dist;
        index index.html;
        client_max_body_size 55m;

        location ^~ /assets/ {
            try_files $uri =404;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
        }

        # 前端 /api → 后端 FastAPI（去掉 /api 前缀）
        location /api/ {
            proxy_pass http://127.0.0.1:8091/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location = /index.html {
            add_header Cache-Control "no-cache";
        }
    }

    # --- coder.lawaibot.com.cn（接单平台，必须在本 server 内，勿重定向到 www）---
    server {
        listen 443 ssl http2;
        server_name coder.lawaibot.com.cn;

        ssl_certificate     /etc/letsencrypt/live/www.lawaibot.com.cn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/www.lawaibot.com.cn/privkey.pem;

        ssl_session_timeout 10m;
        ssl_session_cache shared:SSL:10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        root /root/code/myy_coderland/code_front/dist;
        index index.html;
        client_max_body_size 55m;

        location ^~ /assets/ {
            try_files $uri =404;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
        }

        location /api/ {
            proxy_pass http://127.0.0.1:8090;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location = /index.html {
            add_header Cache-Control "no-cache";
        }
    }

    # --- www.lawaibot.com.cn（法律咨询）---
    server {
        listen 443 ssl http2;
        server_name www.lawaibot.com.cn;

        ssl_certificate     /etc/letsencrypt/live/www.lawaibot.com.cn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/www.lawaibot.com.cn/privkey.pem;

        ssl_session_timeout 10m;
        ssl_session_cache shared:SSL:10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        root /root/code/go_rag/test_laws_vue/dist;
        index index.html;
        client_max_body_size 55m;

        location ^~ /assets/ {
            try_files $uri =404;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /ai_legal/ {
            proxy_pass http://127.0.0.1:8089;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location = /index.html {
            add_header Cache-Control "no-cache";
        }
    }
}
